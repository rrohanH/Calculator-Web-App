<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="calculator-card">
        <h1>Python Calculator</h1>
        <p class="subtitle">Evaluate expressions safely with Flask.</p>

        <div class="display-wrap">
          <input id="expression" type="text" placeholder="(12 + 8) * 4 / 2" />
          <div id="result" aria-live="polite">Result: -</div>
        </div>

        <div class="button-grid">
          <button data-value="7">7</button>
          <button data-value="8">8</button>
          <button data-value="9">9</button>
          <button data-value="/">/</button>

          <button data-value="4">4</button>
          <button data-value="5">5</button>
          <button data-value="6">6</button>
          <button data-value="*">*</button>

          <button data-value="1">1</button>
          <button data-value="2">2</button>
          <button data-value="3">3</button>
          <button data-value="-">-</button>

          <button data-value="0">0</button>
          <button data-value=".">.</button>
          <button data-value="%">%</button>
          <button data-value="+">+</button>

          <button data-value="(">(</button>
          <button data-value=")">)</button>
          <button id="clear" class="muted">Clear</button>
          <button id="calculate" class="accent">=</button>
        </div>
      </section>
    </main>
    <script src="/static/script.js"></script>
  </body>
</html>
